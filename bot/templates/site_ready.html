<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт готов! — SiteForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { text-align: center; background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 60px 40px; max-width: 520px; width: 100%; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { font-size: 1.6rem; margin-bottom: 8px; }
    .sub { color: #8888a0; margin-bottom: 28px; }
    .btn { display: inline-block; padding: 16px 40px; background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; border-radius: 12px; font-weight: 700; font-size: 1rem; text-decoration: none; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn-secondary { display: inline-block; margin-top: 16px; padding: 12px 32px; background: #1a1a26; color: #f97316; border: 1px solid rgba(249,115,22,0.3); border-radius: 10px; font-weight: 600; font-size: 0.9rem; text-decoration: none; }
    .btn-secondary:hover { border-color: #f97316; }
    .info { margin-top: 24px; font-size: 0.85rem; color: #8888a0; }
    .order-id { margin-top: 20px; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h2>Ваш сайт готов!</h2>
    <p class="sub">AI-агент создал сайт по вашему ТЗ. Скачайте архив — там всё что нужно.</p>
    <a href="{{ base_url }}/order/{{ order_id }}/download" class="btn">📦 Скачать архив с сайтом</a>
    <a href="{{ base_url }}/order/{{ order_id }}/revision" class="btn-secondary">✏️ Нужны правки</a>
    <div class="info">В архиве: index.html + инструкция по запуску (Netlify, GitHub Pages, Vercel)</div>
    <div class="order-id">Заказ #{{ order_id }}</div>
  </div>
</body>
</html>
