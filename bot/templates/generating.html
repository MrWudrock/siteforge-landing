<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создаём сайт... — SiteForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { text-align: center; background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 60px 40px; max-width: 480px; width: 100%; }
    .spinner { width: 48px; height: 48px; border: 4px solid #1a1a26; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #8888a0; font-size: 0.95rem; }
    .refresh { margin-top: 20px; font-size: 0.85rem; color: #555; }
    .refresh a { color: #3b82f6; }
  </style>
  <meta http-equiv="refresh" content="30">
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>AI-агент создаёт ваш сайт</h2>
    <p>Это займёт около минуты. Страница обновится автоматически.</p>
    <div class="refresh">Не обновляется? <a href="{{ base_url }}/order/{{ order_id }}/site">Обновить вручную</a></div>
  </div>
</body>
</html>
