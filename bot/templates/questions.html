<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ответьте на вопросы — SiteForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; max-width: 640px; width: 100%; }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .sub { color: #8888a0; font-size: 0.9rem; margin-bottom: 28px; }
    .q-group { margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem; }
    .hint { font-size: 0.8rem; color: #8888a0; margin-bottom: 8px; }
    textarea { width: 100%; padding: 12px 14px; background: #1a1a26; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #e8e8f0; font-family: Inter, sans-serif; font-size: 0.95rem; min-height: 80px; resize: vertical; }
    textarea:focus { outline: none; border-color: #3b82f6; }
    .btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .order-id { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Уточним детали вашего сайта</h1>
    <p class="sub">Заказ #{{ order_id }} · {{ order.name }}</p>
    <form method="POST">
      {% for q in questions %}
      <div class="q-group">
        <label for="{{ q.key }}">{{ q.q }}</label>
        <div class="hint">{{ q.hint }}</div>
        <textarea id="{{ q.key }}" name="{{ q.key }}" placeholder="{{ q.hint }}"></textarea>
      </div>
      {% endfor %}
      <button type="submit" class="btn">Отправить и создать сайт →</button>
    </form>
    <div class="order-id">Заказ #{{ order_id }}</div>
  </div>
</body>
</html>
